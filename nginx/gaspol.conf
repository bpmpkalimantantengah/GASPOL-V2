# GASPOL V2 — Nginx Configuration
# Deploy ke: /etc/nginx/conf.d/gaspol.conf
# Setelah deploy, jalankan: sudo nginx -t && sudo systemctl reload nginx

upstream gaspol_v2 {
    server 127.0.0.1:4000;
}

upstream wa_sender {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name 168.110.208.72;

    # Max upload size
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # ── GASPOL V2 (default) ────────────────────────────────
    location / {
        proxy_pass http://gaspol_v2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # ── WA Sender (backward compatible routes) ─────────────
    # Semua route lama yang dipakai WA Sender tetap diarahkan ke port 3000
    location /api/wa {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/broadcast {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /upload-excel {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /download-report {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /stop-broadcast {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Socket.IO untuk WA Sender ──────────────────────────
    location /socket.io {
        proxy_pass http://wa_sender;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Evaluasi & Cendekia (sudah ada routes di port 3000) ─
    # Fase transisi: tetap arahkan ke WA Sender port 3000
    # Nanti bisa dipindah ke GASPOL V2 port 4000 satu per satu
    location /api/evaluasi {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/cendekia {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/hub_mitra {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/sertifikat {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ppkpsp {
        proxy_pass http://wa_sender;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
